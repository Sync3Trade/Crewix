services:
  postgres:
    image: postgres:16-alpine
    container_name: crewix-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crewix
    volumes:
      - crewix_postgres_data:/var/lib/postgresql/data

volumes:
  crewix_postgres_data:
