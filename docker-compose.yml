services:
  postgres:
    image: postgres:16-alpine
    container_name: vertexwork-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vertexwork
    volumes:
      - vertexwork_postgres_data:/var/lib/postgresql/data

volumes:
  vertexwork_postgres_data:
